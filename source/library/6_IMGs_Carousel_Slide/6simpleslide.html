<style>
body{
  padding:0;
}

@media screen and (-webkit-min-device-pixel-ratio: 0) {

  .fallback{ display:none; }

  .carousel{
    display:block !important;
    max-height:none !important;
    position:relative;
  }

  #MessageViewBody .fallback,
  body.MsgBody .fallback{ display:block; }

  #MessageViewBody .carousel,
  body.MsgBody .carousel{ display:none !important; }

  .carousel a{
    width:100%;
    display:block;
    overflow:hidden;
  }  

  .carousel img{
    display:block!important;
    width:100% !important;
    height:auto !important;
  }

  .carousel.fade a{
    position:absolute;
    top:0;
    left:0; 
    opacity:0;   
    -webkit-animation: car-anim 9s linear infinite;    
  }

  /* DELAY 6 immagini */
  .carousel.fade a:nth-child(1){ position:relative; -webkit-animation-delay: -9s; }
  .carousel.fade a:nth-child(2){ -webkit-animation-delay: -7.5s; }
  .carousel.fade a:nth-child(3){ -webkit-animation-delay: -6s; }
  .carousel.fade a:nth-child(4){ -webkit-animation-delay: -4.5s; }
  .carousel.fade a:nth-child(5){ -webkit-animation-delay: -3s; }
  .carousel.fade a:nth-child(6){ -webkit-animation-delay: -1.5s; }

  /* FADE per 6 */
  @-webkit-keyframes car-anim {
    0%   { opacity:0; z-index:2; }
    4%   { opacity:1; }
    13%  { opacity:1; z-index:2; }
    16.66% { opacity:0; z-index:2; }
    16.7% { z-index:1; }
    100% { opacity:0; z-index:1; }
  }

  /* EFFECTS */
  .carousel.effects img{
    -webkit-animation-duration: 9s;
    -webkit-animation-timing-function: linear;
    -webkit-animation-iteration-count: infinite;
  }

  .carousel.effects a:nth-child(1) img{ -webkit-animation-delay: -9s; }
  .carousel.effects a:nth-child(2) img{ -webkit-animation-delay: -7.5s; }
  .carousel.effects a:nth-child(3) img{ -webkit-animation-delay: -6s; }
  .carousel.effects a:nth-child(4) img{ -webkit-animation-delay: -4.5s; }
  .carousel.effects a:nth-child(5) img{ -webkit-animation-delay: -3s; }
  .carousel.effects a:nth-child(6) img{ -webkit-animation-delay: -1.5s; }

  .zoom-in{ -webkit-animation-name: effect-zoomin; }
  .zoom-out{ -webkit-animation-name: effect-zoomout; }
  .pan-right{ -webkit-animation-name: effect-panright; }
  .pan-left{ -webkit-animation-name: effect-panleft; }

  /* effetti adattati a 6 */
  @-webkit-keyframes effect-zoomin {
    0% { -webkit-transform: scale(1); }
    16.66% { -webkit-transform: scale(1.2); }
    20% { -webkit-transform: scale(1.2); }
    100% { -webkit-transform: scale(1); }
  }

  @-webkit-keyframes effect-zoomout {
    0% { -webkit-transform: scale(1.2); }
    16.66% { -webkit-transform: scale(1); }
    20% { -webkit-transform: scale(1); }
    100% { -webkit-transform: scale(1.2); }
  }

  @-webkit-keyframes effect-panright {
    0% { -webkit-transform: scale(1.2); margin-left:-10%; }
    16.66% { margin-left:10%; }
    20% { margin-left:10%; }
    100% { margin-left:-10%; }
  }

  @-webkit-keyframes effect-panleft {
    0% { -webkit-transform: scale(1.2); margin-left:10%; }
    16.66% { margin-left:-10%; }
    20% { margin-left:-10%; }
    100% { margin-left:10%; }
  }

}
</style>


<table cellpadding="0" cellspacing="0" border="0" width="600" role="presentation">
<tr>
<td>

<!--[if !mso]> -->
<div class="carousel fade effects" style="overflow:hidden;display:none;max-height:0;">
  <div class="car-cont" style="position:relative;">

    <a href="#"><img class="zoom-in" src="https://placehold.co/1200x800?text=Image+1"></a>
    <a href="#"><img class="zoom-out" src="https://placehold.co/1200x800?text=Image+2"></a>
    <a href="#"><img class="pan-right" src="https://placehold.co/1200x800?text=Image+3"></a>
    <a href="#"><img class="pan-left" src="https://placehold.co/1200x800?text=Image+4"></a>
    <a href="#"><img class="zoom-out" src="https://placehold.co/1200x800?text=Image+5"></a>
    <a href="#"><img class="pan-right" src="https://placehold.co/1200x800?text=Image+6"></a>

  </div>
</div>
<!--<![endif]-->

<br><br>

<div class="fallback">
  <a href="#">
    <img src="https://placehold.co/1200x800?text=Fallback+Image" width="600" style="display:block;">
  </a>
</div>

</td>
</tr>
</table>
