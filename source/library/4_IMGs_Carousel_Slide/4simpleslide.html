<style>
/** Carousel CSS **/
body{
  padding:0;
}

@media screen and (-webkit-min-device-pixel-ratio: 0) {

  .fallback{
    display:none;
  }

  .carousel{
    display:block !important;
    max-height:none !important;
    position:relative;
  }

  #MessageViewBody .fallback,
  body.MsgBody .fallback{ 
    display:block; 
  }
  #MessageViewBody .carousel,
  body.MsgBody .carousel{
    display:none !important;
  }

  .carousel a{
    width:100%;
    display:block;
    overflow:hidden;
  }  

  .carousel img{
    display:block!important;
    width:100% !important;
    height:auto !important;
  }

  .carousel.responsive{
    width:100% !important;
  }

  .carousel.responsive .car-cont{
    width:100% !important;
    height:auto !important;
  }  

  /* FADE (4 immagini) */
  .carousel.fade a{
    position:absolute;
    top:0px;
    left:0px; 
    opacity:0;   
    -webkit-animation: car-anim 9s linear infinite;    
  }

  .carousel.fade a:nth-child(1){
    position:relative;
    -webkit-animation-delay: -9s;    
  }
  .carousel.fade a:nth-child(2){
    -webkit-animation-delay: -6.75s;    
  }
  .carousel.fade a:nth-child(3){
    -webkit-animation-delay: -4.5s;    
  }
  .carousel.fade a:nth-child(4){
    -webkit-animation-delay: -2.25s;    
  }

  @-webkit-keyframes car-anim {
    0% {
      opacity: 0;
      z-index: 2;
    }
    5% {
      opacity: 1;
    }
    20% {
      opacity: 1;
      z-index: 2;
    }
    25% {
      opacity: 0;
      z-index: 2;
    }
    25.1% {
      z-index: 1;
    }
    100% {
      opacity: 0;
      z-index: 1;
    }
  }

  /* EFFECTS */
  .carousel.effects img{
    -webkit-animation-duration: 9s;
    -webkit-animation-timing-function: linear;
    -webkit-animation-iteration-count: infinite;
  }

  .carousel.effects a:nth-child(1) img{
    -webkit-animation-delay: -9s;    
  }
  .carousel.effects a:nth-child(2) img{
    -webkit-animation-delay: -6.75s;    
  }
  .carousel.effects a:nth-child(3) img{
    -webkit-animation-delay: -4.5s;    
  }
  .carousel.effects a:nth-child(4) img{
    -webkit-animation-delay: -2.25s;    
  }

  .carousel.effects img.zoom-in{
    -webkit-animation-name: effect-zoomin;
  }
  .carousel.effects img.zoom-out{
    -webkit-animation-name: effect-zoomout;
  }
  .carousel.effects img.pan-right{
    -webkit-animation-name: effect-panright;
  }
  .carousel.effects img.pan-left{
    -webkit-animation-name: effect-panleft;
  }

  @-webkit-keyframes effect-zoomin {
    0% { -webkit-transform: scale(1); }
    25% { -webkit-transform: scale(1.2); }
    30% { -webkit-transform: scale(1.2); }
    100% { -webkit-transform: scale(1); }
  }

  @-webkit-keyframes effect-zoomout {
    0% { -webkit-transform: scale(1.2); }
    25% { -webkit-transform: scale(1); }
    30% { -webkit-transform: scale(1); }
    100% { -webkit-transform: scale(1.2); }
  }

  @-webkit-keyframes effect-panright {
    0% {
      -webkit-transform: scale(1.2);
      margin-left:-10%;
    }
    25% {
      -webkit-transform: scale(1.2);
      margin-left:10%;
    }
    30% {
      -webkit-transform: scale(1.2);
      margin-left:10%;
    }
    100% {
      -webkit-transform: scale(1.2);
      margin-left:-10%;
    }
  }

  @-webkit-keyframes effect-panleft {
    0% {
      -webkit-transform: scale(1.2);
      margin-left:10%;
    }
    25% {
      -webkit-transform: scale(1.2);
      margin-left:-10%;
    }
    30% {
      -webkit-transform: scale(1.2);
      margin-left:-10%;
    }
    100% {
      -webkit-transform: scale(1.2);
      margin-left:10%;
    }
  }

}
</style>


<table cellpadding="0" cellspacing="0" border="0" width="600" class="resptab" role="presentation" style="width:600px;">
  <tr align="center">
    <td align="center">

      <!--[if !mso]> -->
      <div class="carousel fade responsive effects" style="overflow:hidden;display:none;max-height:0px;">
        <div class="car-cont" style="position:relative;">

          <a href="##">
            <img class="zoom-in" src="https://placehold.co/1200x800/text=Image+1" border="0">
          </a>

          <a href="##">
            <img class="zoom-out" src="https://placehold.co/1200x800/text=Image+2" border="0">
          </a>

          <a href="##">
            <img class="pan-right" src="https://placehold.co/1200x800/text=Image+3" border="0">
          </a>

          <a href="##">
            <img class="pan-left" src="https://placehold.co/1200x800/text=Image+4" border="0">
          </a>

        </div>
      </div>
      <!--<![endif]-->

      <br><br>

      <!-- fallback -->
      <div class="fallback">
        <a href="##">
          <img src="https://placehold.co/1200x800/?text=Fallback+Image" width="600" height="400" style="display:block;" border="0">
        </a>
      </div>

    </td>
  </tr>
