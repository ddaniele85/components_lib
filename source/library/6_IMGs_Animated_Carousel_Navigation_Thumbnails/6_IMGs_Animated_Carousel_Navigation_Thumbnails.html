<style>
body{
  padding:0;
}

@media screen and (-webkit-min-device-pixel-ratio: 0) {

  body { -webkit-animation: bugfix infinite 1s; } 
  @-webkit-keyframes bugfix { from { padding: 0; } to { padding: 0; } }

  .fallback{ display:none; }

  .carousel{
    display:block !important;
    max-height:none !important;
    position:relative;
  }

  #MessageViewBody .fallback,
  body.MsgBody .fallback{ display:block; }

  #MessageViewBody .carousel,
  body.MsgBody .carousel{ display:none !important; }

  input{display:none;}

  .carousel a{
    width:100%;
    display:block;
    overflow:hidden;
  }  

  .carousel .car-frames img{
    display:block!important;
    width:100% !important;
    height:auto !important;
  }

  .carousel.responsive{ width:100% !important; }

  /* ANIMAZIONE 6 SLIDE */
  .carousel.slide a{
    position:absolute;
    top:0;
    left:0; 
    opacity:1;   
    width:100%;
    -webkit-animation: slide-anim 36s linear infinite;    
  }

  .carousel.slide a:nth-child(1){ position:relative; -webkit-animation-delay:-36s; }
  .carousel.slide a:nth-child(2){ -webkit-animation-delay:-30s; }
  .carousel.slide a:nth-child(3){ -webkit-animation-delay:-24s; }
  .carousel.slide a:nth-child(4){ -webkit-animation-delay:-18s; }
  .carousel.slide a:nth-child(5){ -webkit-animation-delay:-12s; }
  .carousel.slide a:nth-child(6){ -webkit-animation-delay:-6s; }

  @-webkit-keyframes slide-anim {
    0% { margin-left:100%; }
    5% { margin-left:0%; }

    16.66% { margin-left:0%; }
    21.66% { margin-left:-100%; }

    33.33% { margin-left:-100%; }
    38.33% { margin-left:-200%; }

    50% { margin-left:-200%; }
    55% { margin-left:-300%; }

    66.66% { margin-left:-300%; }
    71.66% { margin-left:-400%; }

    83.33% { margin-left:-400%; }
    88.33% { margin-left:-500%; }

    100% { margin-left:-500%; }
  }

  .carousel.slide .car-radio:checked ~ .car-cont .car-frames{ 
    position:relative;
    width:600% !important;
    left:0;
    transition:left 1s;
  }

  .carousel.slide .car-radio1:checked ~ .car-cont .car-frames{ left:0%; }
  .carousel.slide .car-radio2:checked ~ .car-cont .car-frames{ left:-100%; }
  .carousel.slide .car-radio3:checked ~ .car-cont .car-frames{ left:-200%; }
  .carousel.slide .car-radio4:checked ~ .car-cont .car-frames{ left:-300%; }
  .carousel.slide .car-radio5:checked ~ .car-cont .car-frames{ left:-400%; }
  .carousel.slide .car-radio6:checked ~ .car-cont .car-frames{ left:-500%; }

  .carousel.slide .car-radio:checked ~ .car-cont a{
    width:16.66%;
  }

  .carousel.slide .car-radio:checked ~ .car-cont a:nth-child(2){ left:16.66%; }
  .carousel.slide .car-radio:checked ~ .car-cont a:nth-child(3){ left:33.33%; }
  .carousel.slide .car-radio:checked ~ .car-cont a:nth-child(4){ left:50%; }
  .carousel.slide .car-radio:checked ~ .car-cont a:nth-child(5){ left:66.66%; }
  .carousel.slide .car-radio:checked ~ .car-cont a:nth-child(6){ left:83.33%; }

  .carousel .car-radio:checked ~ .car-cont,
  .carousel .car-radio:checked ~ .car-cont *{
    -webkit-animation:none;
  }

  /* THUMBNAILS */
  .carousel #car-cbox-support:checked ~ .car-thumbnails {
    display:block!important;
    text-align:center;
  }

  .carousel .car-thumb {
    width:16%;
    opacity:0.5;
    display:inline-block;
  }

  .carousel .car-thumb img{
    width:100%;
  }

  .car-radio1:checked ~ .car-thumbnails .car-thumb:nth-child(1),
  .car-radio2:checked ~ .car-thumbnails .car-thumb:nth-child(2),
  .car-radio3:checked ~ .car-thumbnails .car-thumb:nth-child(3),
  .car-radio4:checked ~ .car-thumbnails .car-thumb:nth-child(4),
  .car-radio5:checked ~ .car-thumbnails .car-thumb:nth-child(5),
  .car-radio6:checked ~ .car-thumbnails .car-thumb:nth-child(6){
    opacity:1;
  }
@-webkit-keyframes focus6-anim-1 {
  0%, 16.66% {opacity:1;}
  17%, 100% {opacity:0.5;}
}
@-webkit-keyframes focus6-anim-2 {
  0%, 16.66% {opacity:0.5;}
  17%, 33.33% {opacity:1;}
  34%, 100% {opacity:0.5;}
}
@-webkit-keyframes focus6-anim-3 {
  0%, 33.33% {opacity:0.5;}
  34%, 50% {opacity:1;}
  51%, 100% {opacity:0.5;}
}
@-webkit-keyframes focus6-anim-4 {
  0%, 50% {opacity:0.5;}
  51%, 66.66% {opacity:1;}
  67%, 100% {opacity:0.5;}
}
@-webkit-keyframes focus6-anim-5 {
  0%, 66.66% {opacity:0.5;}
  67%, 83.33% {opacity:1;}
  84%, 100% {opacity:0.5;}
}
@-webkit-keyframes focus6-anim-6 {
  0%, 83.33% {opacity:0.5;}
  84%, 100% {opacity:1;}
}

/* applicazione animazioni */
.car-thumb:nth-child(1){ -webkit-animation: focus6-anim-1 36s linear infinite; }
.car-thumb:nth-child(2){ -webkit-animation: focus6-anim-2 36s linear infinite; }
.car-thumb:nth-child(3){ -webkit-animation: focus6-anim-3 36s linear infinite; }
.car-thumb:nth-child(4){ -webkit-animation: focus6-anim-4 36s linear infinite; }
.car-thumb:nth-child(5){ -webkit-animation: focus6-anim-5 36s linear infinite; }
.car-thumb:nth-child(6){ -webkit-animation: focus6-anim-6 36s linear infinite; }

/* quando l'utente interagisce (radio attivo), stop animazione */
.carousel .car-radio:checked ~ .car-thumbnails .car-thumb{
  opacity:0.5 !important;
  -webkit-animation:none !important;
}

.carousel .car-radio1:checked ~ .car-thumbnails .car-thumb:nth-child(1),
.carousel .car-radio2:checked ~ .car-thumbnails .car-thumb:nth-child(2),
.carousel .car-radio3:checked ~ .car-thumbnails .car-thumb:nth-child(3),
.carousel .car-radio4:checked ~ .car-thumbnails .car-thumb:nth-child(4),
.carousel .car-radio5:checked ~ .car-thumbnails .car-thumb:nth-child(5),
.carousel .car-radio6:checked ~ .car-thumbnails .car-thumb:nth-child(6){
  opacity:1 !important;
}
}
</style>
