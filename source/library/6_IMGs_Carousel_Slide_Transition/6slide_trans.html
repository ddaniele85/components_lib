<style type="text/css">
body {
    padding: 0;
}

@media screen and (-webkit-min-device-pixel-ratio: 0) {
/* Hide Fallback content first */
.fallback {
    display: none;
}
.carousel {
    display: block !important;
    max-height: none !important;
    position: relative;
}
/* 
  Selective blocking for clients.
  - Samsung (#MessageViewBody) - no absolute positioning
  - Comcast/Zimbra (body.MsgBody) - inconsistent CSS support
  */
#MessageViewBody .fallback, body.MsgBody .fallback {
    display: block;
}
#MessageViewBody .carousel, body.MsgBody .carousel {
    display: none !important;
}
.carousel a {
    width: 100%;
    display: block;
    overflow: hidden;
}
.carousel img {
    display: block!important;
    width: 100% !important;
    height: auto !important;
}
.carousel.responsive {
    width: 100% !important;
}
.carousel.responsive .car-cont {
    width: 100% !important;
    height: auto !important;
}
/* SLIDE */

.carousel.slide a {
    position: absolute;
    top: 0px;
    left: 0px;
    opacity: 1;
    width: 100%;
    -webkit-animation: slide-anim 18s linear infinite;
}
.carousel.slide a:nth-child(1) {
    position: relative;
    -webkit-animation-delay: -15s;
}
.carousel.slide a:nth-child(2) {
    -webkit-animation-delay: -12s;
}
.carousel.slide a:nth-child(3) {
    -webkit-animation-delay: -9s;
}
.carousel.slide a:nth-child(4) {
    -webkit-animation-delay: -6s;
}
.carousel.slide a:nth-child(5) {
    -webkit-animation-delay: -3s;
}
.carousel.slide a:nth-child(6) {
    -webkit-animation-delay: 0s;
}

  /* iOS doesn't like negative delay with translates (transform:translateX(100%);) */
  /* So we use margin although it is less "smooth" */
@-webkit-keyframes slide-anim {
    /* slide in */
    0% {
        margin-left: 100%;
    }
    5% {
        margin-left: 0%;
    }

    /* visible */
    16.66% {
        margin-left: 0%;
    }

    /* slide out */
    21.66% {
        margin-left: -100%;
    }

    100% {
        margin-left: -100%;
    }
}

}
</style>
