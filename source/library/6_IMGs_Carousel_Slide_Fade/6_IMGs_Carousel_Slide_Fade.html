<style type="text/css">
body {
    padding: 0;
}

@media screen and (-webkit-min-device-pixel-ratio: 0) {

/* Hide Fallback content first */
.fallback {
    display: none;
}

.carousel {
    display: block !important;
    max-height: none !important;
    position: relative;
}

#MessageViewBody .fallback, body.MsgBody .fallback {
    display: block;
}
#MessageViewBody .carousel, body.MsgBody .carousel {
    display: none !important;
}

.carousel a {
    width: 100%;
    display: block;
}

.carousel img {
    display: block!important;
    width: 100% !important;
    height: auto !important;
}

.carousel.responsive {
    width: 100% !important;
}

.carousel.responsive .car-cont {
    width: 100% !important;
    height: auto !important;
}

/* FADE 6 IMMAGINI */
.carousel.fade a {
    position: absolute;
    top: 0px;
    left: 0px;
    -webkit-animation: car-anim 18s linear infinite;
}

/* Delay distribuiti ogni 3s */
.carousel.fade a:nth-child(1) {
    position: relative;
    -webkit-animation-delay: -18s;
}
.carousel.fade a:nth-child(2) {
    -webkit-animation-delay: -15s;
}
.carousel.fade a:nth-child(3) {
    -webkit-animation-delay: -12s;
}
.carousel.fade a:nth-child(4) {
    -webkit-animation-delay: -9s;
}
.carousel.fade a:nth-child(5) {
    -webkit-animation-delay: -6s;
}
.carousel.fade a:nth-child(6) {
    -webkit-animation-delay: -3s;
}

@-webkit-keyframes car-anim {

  /* fade in */
  0% {
    z-index:2;
    opacity:0;
  }

  5% {
    opacity:1;
  }

  /* visibile */
  16.66% {
    z-index:2;
  }

  /* prepara transizione */
  16.67% {
    z-index:1;
  }

  /* ancora visibile */
  20% {
    opacity:1;
  }

  /* fade out */
  20.01% {
    opacity:0;
  }

  /* nascosta */
  100% {
    z-index:1;
    opacity:0;
  }
}

}
</style>
